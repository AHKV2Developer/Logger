<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    
    <title>Voice Logger</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; padding: 10px; text-align: center; margin: 0; display: flex; flex-direction: column; height: 100vh; transition: none; }
        
        #ui-container { margin-bottom: 5px; }
        #btn-container { display: flex; flex-direction: column; width: 100%; gap: 10px; }
        
        .btn { padding: 40px 0; border-radius: 20px; border: none; color: white; font-size: 24px; font-weight: bold; touch-action: none; transition: all 0.2s; }
        .blue { background: #007bff; }
        .green { background: #28a745; }

        #status { font-size: 16px; color: #bbb; margin-top: 10px; }
        #transcript { font-style: italic; color: #4fc3f7; margin-top: 5px; font-size: 16px; flex-grow: 1; overflow-y: auto; }

        /* SHRUNK MODE: Optimized for Split Screen */
        body.shrunk #ui-container { display: none; }
        body.shrunk #btn-container { flex-direction: row; justify-content: space-between; gap: 5%; width: 100%; }
        body.shrunk .btn { width: 47.5%; padding: 20px 0; font-size: 20px; border-radius: 15px; }
        body.shrunk #status { font-size: 12px; }
        body.shrunk #transcript { font-size: 12px; }
    </style>
</head>
<body>

 <div id="setup-screen" style="display:none; padding-top: 50px;">
    <h2>Setup Required</h2>
    <input type="text" id="deployInput" placeholder="Google Script URL..." style="width:90%; padding:10px;">
    <button onclick="saveSetup()" class="btn blue" style="width:90%; margin-top:10px;">Save</button>
 </div>

 <div id="ui-container"><h2>Voice Logger</h2></div>
  
 <div id="btn-container">
     <button id="btnVoice" class="btn blue">VOICE</button>
     <button id="btnGps" class="btn green">GPS</button>
 </div>

 <div id="status">Ready</div>
 <div id="transcript">...</div>

 <script>
    let pressTimer;
    let manualOverride = false; // Prevents auto-shrink from fighting the user
    const LONG_PRESS_DURATION = 600; 

    // Resize Observer: Auto-Shrink if width < 50% of screen width
    const observer = new ResizeObserver(entries => {
        if (manualOverride) return; // Respect user choice
        
        const width = entries[0].contentRect.width;
        const threshold = window.screen.width * 0.5;
        
        if (width < threshold) {
            document.body.classList.add('shrunk');
        } else {
            document.body.classList.remove('shrunk');
        }
    });
    observer.observe(document.body);

    function toggleShrunk() {
        manualOverride = true; // User has made a specific choice
        document.body.classList.toggle('shrunk');
    }

    // Gesture Logic
    function setupButton(button, useGps) {
        button.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => {
                toggleShrunk();
                pressTimer = null; 
            }, LONG_PRESS_DURATION);
        });
        button.addEventListener('touchend', (e) => {
            if (pressTimer) {
                clearTimeout(pressTimer);
                startVoice(useGps);
            }
        });
    }

    setupButton(document.getElementById('btnVoice'), false);
    setupButton(document.getElementById('btnGps'), true);

    // Recording Logic
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.onstart = () => { document.getElementById('status').innerText = "Listening..."; };
    recognition.onresult = (event) => {
        let text = event.results[0][0].transcript;
        document.getElementById('transcript').innerText = text.charAt(0).toUpperCase() + text.slice(1);
        document.getElementById('status').innerText = "Processing...";
        const useGps = localStorage.getItem('lastUseGps') === 'true';
        
        if (useGps) {
            navigator.geolocation.getCurrentPosition(pos => sendData(text, pos.coords.latitude, pos.coords.longitude), err => sendData(text, "GPS Error", "GPS Error"));
        } else {
            sendData(text, "N/A", "N/A");
        }
    };

    function startVoice(useGps) {
        localStorage.setItem('lastUseGps', useGps);
        document.getElementById('transcript').innerText = "...";
        recognition.start();
    }

    function sendData(text, lat, lon) {
        fetch(localStorage.getItem('loggerScriptURL'), { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ text, lat, lon }) })
        .then(() => {
            document.getElementById('status').innerText = "✅ Saved!";
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 2000);
        });
    }

    if(!localStorage.getItem('loggerScriptURL')) document.getElementById('setup-screen').style.display = 'block';
    function saveSetup() {
        const url = document.getElementById('deployInput').value;
        if (url.includes('script.google.com')) {
            localStorage.setItem('loggerScriptURL', url);
            location.reload();
        }
    }
 </script>
</body>
</html>
