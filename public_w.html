<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Logger</title>
    <style>
        /* 1. Theme Variables (Default is Dark Mode) */
        :root {
            --bg: #121212;
            --text: #ffffff;
            --status-text: #bbb;
            --btn-voice: #2563eb;
            --btn-gps: #10b981;
        }

        /* Light Mode Override */
        body.light {
            --bg: #ffffff;
            --text: #121212;
            --status-text: #666;
        }

        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            text-align: center; 
            height: 100vh; 
            margin: 0; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            transition: background 0.3s;
        }
        
        #btn-container { display: flex; flex-direction: column; width: 100%; transition: all 0.3s; }

        .btn { width: 100%; padding: 40px 0; border-radius: 20px; border: none; color: white; font-size: 24px; font-weight: bold; margin: 15px 0; touch-action: none; }
        
        /* Updated Colors */
        .blue { background: var(--btn-voice); }
        .green { background: var(--btn-gps); }

        #status { font-size: 20px; color: var(--status-text); margin-top: 20px; }
        #transcript { font-style: italic; color: #4fc3f7; margin: 20px; min-height: 50px; font-size: 18px; }

        /* SHRUNK MODE (Unchanged) */
        body.shrunk h2 { display: none; }
        body.shrunk #btn-container { flex-direction: row; justify-content: space-between; gap: 10px; margin-top: 10px; }
        body.shrunk .btn { width: 48%; padding: 25px 0; font-size: 16px; margin: 0; }
        body.shrunk #status { font-size: 16px; }
        body.shrunk #transcript { font-size: 16px; margin: 10px; }
    </style>
</head>
<body>

 <h2 id="app-title">Voice Logger</h2>
  
 <div id="btn-container">
     <button id="btnVoice" class="btn blue">🎤 VOICE ONLY</button>
     <button id="btnGps" class="btn green">📍 VOICE + GPS</button>
 </div>
  
 <div id="status">Ready</div>
 <div id="transcript">...</div>

 <script>
    // --- 1. SETUP ---
    function handleSetup() {
        const urlParams = new URLSearchParams(window.location.search);
        const deployUrl = urlParams.get('deploy');
        if (deployUrl && /^https:\/\/script\.google\.com\/macros\/s\/[a-zA-Z0-9_-]+\/exec$/.test(deployUrl)) {
            localStorage.setItem('loggerScriptURL', deployUrl);
            window.history.replaceState(null, '', window.location.origin + window.location.pathname);
        }
        // Load saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
        }
    }
    handleSetup();

    // --- 2. TELEMETRY MODULE ---
    async function getInstallationID() {
        let installId = localStorage.getItem('app_installation_id');
        if (!installId) {
            const deployUrl = localStorage.getItem('loggerScriptURL') || "unknown";
            const msgUint8 = new TextEncoder().encode(deployUrl);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            installId = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
            localStorage.setItem('app_installation_id', installId);
        }
        return installId;
    }

    async function reportTelemetry(data) {
        const HUB_DEPLOY_URL = "https://script.google.com/macros/s/AKfycbwNCCGAngwh9F7CR5zJDCljhufzG1pQScxYPCnIteA-6z0S6l3CxVvA4kSpTi6QNE_goQ/exec";
        try {
            const installId = await getInstallationID();
            fetch(HUB_DEPLOY_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ installationID: installId, timestamp: new Date().toISOString(), ...data })
            });
        } catch (err) { console.log("Telemetry background report skipped."); }
    }

    // --- 3. GESTURE LOGIC ---
    let pressTimer;
    let isLongPress = false;

    // Function 1: Layout Toggle
    function toggleMode() {
        isLongPress = true; 
        document.body.classList.toggle('shrunk');
        const isShrunk = document.body.classList.contains('shrunk');
        document.getElementById('btnVoice').innerText = isShrunk ? "🎤 VOICE" : "🎤 VOICE ONLY";
        document.getElementById('btnGps').innerText = isShrunk ? "📍 GPS" : "📍 VOICE + GPS";
    }

    // Function 2: Theme Toggle
    function toggleTheme() {
        isLongPress = true;
        document.body.classList.toggle('light');
        const isLight = document.body.classList.contains('light');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    function setupButton(btn, useGps, longPressFn) {
        btn.addEventListener('pointerdown', (e) => {
            isLongPress = false;
            pressTimer = setTimeout(longPressFn, 400);
        });

        btn.addEventListener('pointerup', (e) => {
            clearTimeout(pressTimer);
            if (!isLongPress) { startVoice(useGps); }
        });
    }

    // Assign long-press functions
    setupButton(document.getElementById('btnVoice'), false, toggleMode);
    setupButton(document.getElementById('btnGps'), true, toggleTheme);

    // --- 4. VOICE RECOGNITION ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    let currentUseGps = false;

    recognition.onstart = () => { document.getElementById('status').innerText = "Listening..."; };

    recognition.onresult = (event) => {
        let rawText = event.results[0][0].transcript;
        const text = rawText.charAt(0).toUpperCase() + rawText.slice(1);
        document.getElementById('transcript').innerText = text;
        document.getElementById('status').innerText = "Processing...";
        
        if (currentUseGps) {
            navigator.geolocation.getCurrentPosition(
                pos => sendData(text, pos.coords.latitude, pos.coords.longitude),
                err => sendData(text, "GPS Error", "GPS Error")
            );
        } else {
            sendData(text, "N/A", "N/A");
        }
    };

    function startVoice(useGps) {
        const url = localStorage.getItem('loggerScriptURL');
        if (!url) { alert("Setup not complete."); return; }
        currentUseGps = useGps;
        document.getElementById('transcript').innerText = "...";
        recognition.start();
    }

    function sendData(text, lat, lon) {
        // 1. Report to Local S/S
        fetch(localStorage.getItem('loggerScriptURL'), {
            method: 'POST', 
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, lat: lat, lon: lon })
        })
        .then(() => {
            // Success: Update status
            document.getElementById('status').innerText = "✅ Saved & Copied!";
            
            // Success: Copy to clipboard
            try {
                navigator.clipboard.writeText(text);
            } catch (err) {
                console.error("Clipboard copy failed: ", err);
            }

            // Reset status after 2 seconds
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 2000);
        });

        // 2. Report to Analytics Hub
        reportTelemetry({
            deployUrl: localStorage.getItem('loggerScriptURL'),
            hasGPS: (lat !== "N/A" && lat !== "GPS Error"),
            eventType: 'voice_log'
        });
    }
 </script>
</body>
</html>
