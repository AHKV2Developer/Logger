<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Logger</title>
    <style>
        /* 1. Theme Variables */
        :root {
            --primary: #2563eb;
            --gps: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-sub: #475569;
            --status: #64748b;
        }

        /* Dark Theme Variables */
        body.dark {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #bbb;
            --status: #888;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            transition: background 0.3s;
        }

        .container { 
            background: var(--card-bg); 
            padding: 2rem; 
            border-radius: 1.5rem; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            transition: background 0.3s;
        }

        #status { margin: 1rem 0; font-weight: 500; color: var(--text-main); min-height: 1.5rem; }
        #transcribedText { font-size: 0.9rem; color: var(--text-sub); margin: 10px 0; font-style: italic; min-height: 1.2rem; }
        
        button { border: none; border-radius: 1rem; padding: 1rem 2rem; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.1s; width: 100%; margin-bottom: 1rem; color: white; }
        button:active { transform: scale(0.98); }
        
        .btn-voice { background: var(--primary); }
        .btn-gps { background: var(--gps); }

        /* SHRUNK MODE STYLES */
        body.shrunk .container { padding: 1rem; }
        body.shrunk .btn-group { display: flex; gap: 10px; }
        body.shrunk button { margin-bottom: 0; padding: 0.8rem; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="status">Ready</div>
    <div id="transcribedText">...</div>
    
    <div class="btn-group">
        <button id="btnVoice" class="btn-voice">🎤 VOICE</button>
        <button id="btnGps" class="btn-gps">📍 GPS</button>
    </div>
</div>

<script>
    // --- 1. SETUP & THEME PERSISTENCE ---
    function handleSetup() {
        const urlParams = new URLSearchParams(window.location.search);
        const deployUrl = urlParams.get('deploy');
        if (deployUrl && /^https:\/\/script\.google\.com\/macros\/s\/[a-zA-Z0-9_-]+\/exec$/.test(deployUrl)) {
            localStorage.setItem('loggerScriptURL', deployUrl);
            window.history.replaceState(null, '', window.location.origin + window.location.pathname);
        }
        
        // Restore Theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
    }
    handleSetup();

    // --- 2. TELEMETRY MODULE ---
    async function getInstallationID() {
        let installId = localStorage.getItem('app_installation_id');
        if (!installId) {
            const deployUrl = localStorage.getItem('loggerScriptURL') || "unknown";
            const msgUint8 = new TextEncoder().encode(deployUrl);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            installId = hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
            localStorage.setItem('app_installation_id', installId);
        }
        return installId;
    }

    async function reportTelemetry(data) {
        const HUB_DEPLOY_URL = "YOUR_HUB_DEPLOYMENT_URL_HERE"; 
        try {
            const installId = await getInstallationID();
            fetch(HUB_DEPLOY_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ installationID: installId, timestamp: new Date().toISOString(), ...data })
            });
        } catch (err) { console.log("Telemetry skipped."); }
    }

    // --- 3. INTERACTION LOGIC ---
    let pressTimer;
    let isLongPress = false;

    function toggleShrunk() {
        document.body.classList.toggle('shrunk');
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function setupButton(btn, useGps, longPressFn) {
        btn.addEventListener('pointerdown', (e) => {
            isLongPress = false;
            pressTimer = setTimeout(() => {
                isLongPress = true;
                longPressFn();
            }, 500); // 500ms trigger
        });

        btn.addEventListener('pointerup', (e) => {
            clearTimeout(pressTimer);
            if (!isLongPress) { startVoice(useGps); }
        });
    }

    setupButton(document.getElementById('btnVoice'), false, toggleShrunk);
    setupButton(document.getElementById('btnGps'), true, toggleDarkMode);

    // --- 4. VOICE RECOGNITION ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    let currentUseGps = false;

    recognition.onstart = () => { document.getElementById('status').innerText = "Listening..."; };
    recognition.onresult = (event) => {
        let text = event.results[0][0].transcript;
        document.getElementById('transcribedText').innerText = text.charAt(0).toUpperCase() + text.slice(1);
        document.getElementById('status').innerText = "Processing...";
        
        if (currentUseGps) {
            navigator.geolocation.getCurrentPosition(
                pos => sendData(text, pos.coords.latitude, pos.coords.longitude),
                err => sendData(text, "GPS Error", "GPS Error")
            );
        } else {
            sendData(text, "N/A", "N/A");
        }
    };

    function startVoice(useGps) {
        const url = localStorage.getItem('loggerScriptURL');
        if (!url) { alert("Setup not complete."); return; }
        currentUseGps = useGps;
        recognition.start();
    }

    function sendData(text, lat, lon) {
        fetch(localStorage.getItem('loggerScriptURL'), {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, lat: lat, lon: lon })
        })
        .then(() => {
            document.getElementById('status').innerText = "✅ Saved!";
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 2000);
        });

        reportTelemetry({
            hasGPS: (lat !== "N/A" && lat !== "GPS Error"),
            eventType: 'voice_log'
        });
    }
 </script>
</body>
</html>
