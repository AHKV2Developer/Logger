<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <title>Voice Logger</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; padding: 20px; text-align: center; margin: 0; }
        
        /* Setup Screen */
        #setup-screen { display: none; padding-top: 50px; }
        body.unconfigured #ui-container, body.unconfigured #btn-container, body.unconfigured #ui-container-bottom { display: none; }
        body.unconfigured #setup-screen { display: block; }

        /* Interface */
        #ui-container, #ui-container-bottom { transition: opacity 0.3s; }
        #btn-container { display: flex; flex-direction: column; width: 100%; transition: all 0.3s; }

        .btn { width: 100%; padding: 40px 0; border-radius: 20px; border: none; color: white; font-size: 24px; font-weight: bold; margin: 15px 0; touch-action: none; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .blue { background: #007bff; }
        .green { background: #28a745; }
        
        /* Lean HUD Styles */
        body.mode-voice #ui-container, body.mode-voice #ui-container-bottom, body.mode-voice #btnGps { display: none; }
        body.mode-gps #ui-container, body.mode-gps #ui-container-bottom, body.mode-gps #btnVoice { display: none; }
        
        body.mode-voice #btn-container, body.mode-gps #btn-container { 
            position: fixed; bottom: 20px; right: 20px; width: 70px; height: 70px; z-index: 9999;
        }
        body.mode-voice .btn, body.mode-gps .btn { 
            width: 70px; height: 70px; padding: 0; border-radius: 50%; font-size: 10px; margin: 0;
        }

        #status { font-size: 20px; color: #bbb; margin-top: 20px; }
        #transcript { font-style: italic; color: #4fc3f7; margin: 20px; min-height: 50px; }
    </style>
</head>
<body>

 <div id="setup-screen">
    <h2>Setup Required</h2>
    <p>Please paste your Google Script Deploy URL:</p>
    <input type="text" id="deployInput" placeholder="https://script.google.com/..." style="width:90%; padding:15px; border-radius:10px; border:none; margin-bottom: 20px;">
    <button onclick="saveSetup()" class="btn blue">Save Configuration</button>
 </div>

 <div id="ui-container">
     <h2>Voice Logger</h2>
 </div>
  
 <div id="btn-container">
     <button id="btnVoice" class="btn blue">🎤 VOICE</button>
     <button id="btnGps" class="btn green">📍 GPS</button>
 </div>

 <div id="ui-container-bottom">
     <div id="status">Ready</div>
     <div id="transcript">...</div>
 </div>

 <script>
    let pressTimer;
    const LONG_PRESS_DURATION = 600; 

    // 1. Handshake & Setup Logic
    function checkConfiguration() {
        const savedUrl = localStorage.getItem('loggerScriptURL');
        const urlParams = new URLSearchParams(window.location.search);
        const deployUrl = urlParams.get('deploy');
        
        if (deployUrl) {
            const regex = /^https:\/\/script\.google\.com\/macros\/s\/[a-zA-Z0-9_-]+\/exec$/;
            if (regex.test(deployUrl)) {
                localStorage.setItem('loggerScriptURL', deployUrl);
                window.history.replaceState(null, '', window.location.origin + window.location.pathname);
                alert("Setup successful!");
                location.reload();
                return;
            }
        }

        if (!savedUrl) {
            document.body.classList.add('unconfigured');
        }
    }

    function saveSetup() {
        const url = document.getElementById('deployInput').value;
        const regex = /^https:\/\/script\.google\.com\/macros\/s\/[a-zA-Z0-9_-]+\/exec$/;
        if (regex.test(url)) {
            localStorage.setItem('loggerScriptURL', url);
            location.reload(); 
        } else {
            alert("Invalid URL.");
        }
    }

    // 2. Gesture Engine
    function toggleMode(mode) {
        document.body.className = document.body.classList.contains(mode) ? '' : mode;
    }

    function setupButton(button, useGps, modeName) {
        button.addEventListener('touchstart', (e) => {
            pressTimer = setTimeout(() => {
                toggleMode(modeName);
                pressTimer = null; 
            }, LONG_PRESS_DURATION);
        });

        button.addEventListener('touchend', (e) => {
            if (pressTimer) {
                clearTimeout(pressTimer);
                startVoice(useGps);
            }
        });
    }

    setupButton(document.getElementById('btnVoice'), false, 'mode-voice');
    setupButton(document.getElementById('btnGps'), true, 'mode-gps');

    // 3. Recording & Data
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();

    recognition.onstart = () => { document.getElementById('status').innerText = "Listening..."; };
    recognition.onresult = (event) => {
        let text = event.results[0][0].transcript.charAt(0).toUpperCase() + event.results[0][0].transcript.slice(1);
        document.getElementById('transcript').innerText = text;
        document.getElementById('status').innerText = "Processing...";
        const useGps = localStorage.getItem('lastUseGps') === 'true';
        
        if (useGps) {
            navigator.geolocation.getCurrentPosition(pos => sendData(text, pos.coords.latitude, pos.coords.longitude), err => sendData(text, "GPS Error", "GPS Error"));
        } else {
            sendData(text, "N/A", "N/A");
        }
    };

    function startVoice(useGps) {
        localStorage.setItem('lastUseGps', useGps);
        document.getElementById('transcript').innerText = "...";
        recognition.start();
    }

    function sendData(text, lat, lon) {
        document.getElementById('status').innerText = "Sending...";
        fetch(localStorage.getItem('loggerScriptURL'), { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ text, lat, lon }) })
        .then(() => {
            document.getElementById('status').innerText = "✅ Saved!";
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 2000);
        })
        .catch(err => { document.getElementById('status').innerText = "Error"; });
    }

    checkConfiguration();
 </script>
</body>
</html>
