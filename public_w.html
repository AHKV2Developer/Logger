<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Logger</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; padding: 20px; text-align: center; height: 100vh; margin: 0; box-sizing: border-box; display: flex; flex-direction: column; }
        
        h2 { margin-top: 0; }

        /* Main Container for buttons */
        #btn-container { display: flex; flex-direction: column; width: 100%; }

        .btn { width: 100%; padding: 40px 0; border-radius: 20px; border: none; color: white; font-size: 24px; font-weight: bold; margin: 15px 0; touch-action: manipulation; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .blue { background: #007bff; }
        .green { background: #28a745; }

        #status { font-size: 20px; color: #bbb; margin-top: 20px; }
        #transcript { font-style: italic; color: #4fc3f7; margin: 20px; min-height: 50px; font-size: 18px; }

        /* --- SHRUNK MODE --- */
        body.shrunk h2 { display: none; }
        body.shrunk #btn-container { flex-direction: row; justify-content: space-between; gap: 10px; margin-top: 10px; }
        body.shrunk .btn { width: 48%; padding: 25px 0; font-size: 16px; margin: 0; }
        body.shrunk #status { font-size: 16px; }
        body.shrunk #transcript { font-size: 16px; margin: 10px; }
    </style>
</head>
<body>

 <h2 id="app-title">Voice Logger</h2>
  
 <div id="btn-container">
     <button id="btnVoice" class="btn blue">🎤 VOICE ONLY</button>
     <button id="btnGps" class="btn green">📍 VOICE + GPS</button>
 </div>
  
 <div id="status">Ready</div>
 <div id="transcript">...</div>

 <script>
    // --- 1. SETUP & HANDSHAKE ---
    function handleSetup() {
        const urlParams = new URLSearchParams(window.location.search);
        const deployUrl = urlParams.get('deploy');
        if (deployUrl && /^https:\/\/script\.google\.com\/macros\/s\/[a-zA-Z0-9_-]+\/exec$/.test(deployUrl)) {
            localStorage.setItem('loggerScriptURL', deployUrl);
            window.history.replaceState(null, '', window.location.origin + window.location.pathname);
        }
    }
    handleSetup();

    // --- 2. LAYOUT & GESTURE LOGIC ---
    let pressTimer;
    let isRecording = false;
    let manualOverride = false;
    const btnVoice = document.getElementById('btnVoice');
    const btnGps = document.getElementById('btnGps');

    // Auto-switch to Shrunk mode on narrow screens
    const observer = new ResizeObserver(entries => {
        if (manualOverride || isRecording) return;
        const isNarrow = entries[0].contentRect.width < 400;
        if (isNarrow) enterShrunkMode();
        else exitShrunkMode();
    });
    observer.observe(document.body);

    function enterShrunkMode() {
        document.body.classList.add('shrunk');
        btnVoice.innerText = "🎤 VOICE";
        btnGps.innerText = "📍 GPS";
    }

    function exitShrunkMode() {
        document.body.classList.remove('shrunk');
        btnVoice.innerText = "🎤 VOICE ONLY";
        btnGps.innerText = "📍 VOICE + GPS";
    }

    function toggleMode() {
        manualOverride = true;
        if(document.body.classList.contains('shrunk')) exitShrunkMode();
        else enterShrunkMode();
    }

    // Gesture setup
    function setupGesture(btn) {
        btn.addEventListener('touchstart', () => {
            pressTimer = setTimeout(toggleMode, 600);
        });
        btn.addEventListener('touchend', () => {
            clearTimeout(pressTimer);
        });
    }
    setupGesture(btnVoice);
    setupGesture(btnGps);

    // --- 3. VOICE RECOGNITION ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    let useGps = false;

    recognition.onstart = () => {
        isRecording = true;
        document.getElementById('status').innerText = "Listening...";
    };

    recognition.onresult = (event) => {
        let rawText = event.results[0][0].transcript;
        const text = rawText.charAt(0).toUpperCase() + rawText.slice(1);
        document.getElementById('transcript').innerText = text;
        document.getElementById('status').innerText = "Processing...";
        
        if (useGps) {
            navigator.geolocation.getCurrentPosition(
                pos => sendData(text, pos.coords.latitude, pos.coords.longitude),
                err => sendData(text, "GPS Error", "GPS Error")
            );
        } else {
            sendData(text, "N/A", "N/A");
        }
    };

    recognition.onend = () => { isRecording = false; };

    function startVoice(gps) {
        const url = localStorage.getItem('loggerScriptURL');
        if (!url) { alert("Setup not complete."); return; }
        useGps = gps;
        document.getElementById('transcript').innerText = "...";
        recognition.start();
    }

    // --- 4. DATA SENDING ---
    function sendData(text, lat, lon) {
        document.getElementById('status').innerText = "Sending...";
        fetch(localStorage.getItem('loggerScriptURL'), {
            method: 'POST', 
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, lat: lat, lon: lon })
        })
        .then(() => {
            document.getElementById('status').innerText = "✅ Saved!";
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 2000);
        })
        .catch(err => { document.getElementById('status').innerText = "Error"; });
    }

    btnVoice.addEventListener('click', () => { if(!pressTimer) startVoice(false); });
    btnGps.addEventListener('click', () => { if(!pressTimer) startVoice(true); });
 </script>
</body>
</html>
