<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <style>
    body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
    .btn { width: 100%; padding: 40px 0; border-radius: 20px; border: none; color: white; font-size: 24px; font-weight: bold; margin: 15px 0; touch-action: manipulation; }
    .btn:disabled { background: #555; opacity: 0.6; }
    .blue { background: #007bff; }
    .green { background: #28a745; }
    
    #status { font-size: 20px; color: #bbb; margin-top: 20px; }
    #transcript { font-style: italic; color: #4fc3f7; margin: 20px; min-height: 50px; }
    
    /* Toast Notification Style */
    #toast { 
      position: fixed; 
      bottom: 20px; 
      left: 50%; 
      transform: translateX(-50%); 
      background: #333; 
      padding: 10px 20px; 
      border-radius: 5px; 
      display: none; 
      z-index: 1000;
    }
  </style>
</head>
<body>

  <h2>Voice Logger</h2>
  
  <button id="btnVoice" class="btn blue">🎤 VOICE ONLY</button>
  <button id="btnGps" class="btn green" onclick="startVoice(true)">📍 VOICE + GPS</button>
  
  <div id="status">Ready</div>
  <div id="transcript">...</div>
  <div id="toast"></div>

  <script>
    // --- 1. SETUP & HANDSHAKE LOGIC ---
    // This checks for the ?deploy URL parameter to verify the handshake
    function handleSetup() {
        const urlParams = new URLSearchParams(window.location.search);
        const deployUrl = urlParams.get('deploy');

        if (deployUrl) {
            const regex = /^https:\/\/script\.google\.com\/macros\/s\/[a-zA-Z0-9_-]+\/exec$/;
            if (regex.test(deployUrl)) {
                localStorage.setItem('loggerScriptURL', deployUrl);
                alert("Setup Successful! Handshake completed.");
                // Clean the URL to avoid re-triggering setup on refresh
                const cleanUrl = window.location.origin + window.location.pathname;
                window.history.replaceState(null, '', cleanUrl);
            } else {
                alert("Invalid Setup URL provided.");
            }
        }
    }
    // Execute handshake immediately on load
    handleSetup();

    // --- 2. AUDIO & TOGGLE LOGIC ---
    // We strictly store the beep preference as a boolean in localStorage
    let isBeepEnabled = localStorage.getItem('beepEnabled') === 'true';
    
    const btnVoice = document.getElementById('btnVoice');
    const toast = document.getElementById('toast');

    // Display a temporary message for the user
    function showToast(msg) {
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    // Generate an audible beep using Web Audio API
    function playBeep(freq) {
        // If the toggle is explicitly OFF, we exit immediately
        if (isBeepEnabled === false) return;
        
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.frequency.value = freq;
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }

    // --- 3. LONG PRESS GESTURE LOGIC ---
    let pressTimer;
    let isLongPress = false;

    function handleDown() {
        isLongPress = false;
        pressTimer = setTimeout(() => {
            isLongPress = true;
            // Toggle the state
            isBeepEnabled = !isBeepEnabled;
            // Persist the state
            localStorage.setItem('beepEnabled', isBeepEnabled);
            // Provide feedback
            showToast(isBeepEnabled ? "🔊 Beeps: ON" : "🔇 Beeps: OFF");
            playBeep(isBeepEnabled ? 800 : 400);
        }, 500); // Trigger after 500ms
    }

    function handleUp() {
        clearTimeout(pressTimer);
        // Only trigger voice if it was a quick tap, not a long press toggle
        if (!isLongPress) {
            startVoice(false);
        }
    }

    // Add listeners for both mouse and touch (mobile/desktop)
    btnVoice.addEventListener('mousedown', handleDown);
    btnVoice.addEventListener('mouseup', handleUp);
    btnVoice.addEventListener('touchstart', (e) => { e.preventDefault(); handleDown(); });
    btnVoice.addEventListener('touchend', (e) => { e.preventDefault(); handleUp(); });

    // --- 4. VOICE RECOGNITION ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    let useGps = false;

    // Orchestrate starting the voice recognition
    function startVoice(gps) {
        const url = localStorage.getItem('loggerScriptURL');
        if (!url) {
            alert("Setup not complete. Please redo the handshake from your sheet.");
            return;
        }

        playBeep(600); // Start Beep
        useGps = gps;
        document.getElementById('transcript').innerText = "...";
        document.getElementById('status').innerText = "Listening...";
        recognition.start();
    }

    // Handle results
    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('transcript').innerText = text;
        
        if (useGps) {
            document.getElementById('status').innerText = "Getting GPS...";
            navigator.geolocation.getCurrentPosition(
                pos => sendData(text, pos.coords.latitude, pos.coords.longitude),
                err => sendData(text, "GPS Error", "GPS Error")
            );
        } else {
            sendData(text, "N/A", "N/A");
        }
    };

    // --- 5. DATA TRANSMISSION ---
    function sendData(text, lat, lon) {
        document.getElementById('status').innerText = "Sending...";
        fetch(localStorage.getItem('loggerScriptURL'), {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, lat: lat, lon: lon })
        })
        .then(() => {
            document.getElementById('status').innerText = "✅ Saved!";
            playBeep(1000); // Confirmation Beep
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 2000);
        })
        .catch(err => {
            document.getElementById('status').innerText = "Error: " + err;
        });
    }
  </script>
</body>
</html>
