<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voice Logger</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .btn { width: 100%; padding: 40px 0; border-radius: 20px; border: none; color: white; font-size: 24px; font-weight: bold; margin: 15px 0; touch-action: manipulation; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .blue { background: #007bff; }
        .green { background: #28a745; }
        #status { font-size: 20px; color: #bbb; margin-top: 20px; }
        #transcript { font-style: italic; color: #4fc3f7; margin: 20px; min-height: 50px; }
    </style>
</head>
<body>

  <h2>Voice Logger</h2>
  
  <button id="btnVoice" class="btn blue">🎤 VOICE ONLY</button>
  <button id="btnGps" class="btn green">📍 VOICE + GPS</button>
  
  <div id="status">Ready</div>
  <div id="transcript">...</div>

  <script>
    // --- 1. SETUP & HANDSHAKE ---
    function handleSetup() {
        const urlParams = new URLSearchParams(window.location.search);
        const deployUrl = urlParams.get('deploy');

        if (deployUrl) {
            // Regex to ensure the URL matches the Google Script format
            const regex = /^https:\/\/script\.google\.com\/macros\/s\/[a-zA-Z0-9_-]+\/exec$/;
            
            if (regex.test(deployUrl)) {
                localStorage.setItem('loggerScriptURL', deployUrl);
                alert("Setup Successful!");
                window.history.replaceState(null, '', window.location.origin + window.location.pathname);
            } else {
                alert("Error: Invalid Setup URL provided.");
            }
        }
    }
    handleSetup();

    // --- 2. VOICE RECOGNITION ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    const btnVoice = document.getElementById('btnVoice');
    const btnGps = document.getElementById('btnGps');
    let useGps = false;

    // We keep the Status Text, but remove any UI class/color changes
    recognition.onstart = () => {
        document.getElementById('status').innerText = "Listening...";
    };

    recognition.onend = () => {
        // We do nothing here, the status will update on result
    };

    function startVoice(gps) {
        const url = localStorage.getItem('loggerScriptURL');
        if (!url) {
            alert("Setup not complete. Please redo the handshake from your sheet.");
            return;
        }
        
        useGps = gps;
        document.getElementById('transcript').innerText = "...";
        recognition.start();
    }

    recognition.onresult = (event) => {
        let rawText = event.results[0][0].transcript;
        // Capitalize the first letter and keep the rest
        const text = rawText.charAt(0).toUpperCase() + rawText.slice(1);
        
        document.getElementById('transcript').innerText = text;
        document.getElementById('status').innerText = "Processing...";
        
        if (useGps) {
            navigator.geolocation.getCurrentPosition(
                pos => sendData(text, pos.coords.latitude, pos.coords.longitude),
                err => sendData(text, "GPS Error", "GPS Error")
            );
        } else {
            sendData(text, "N/A", "N/A");
        }
    };

    // --- 3. DATA SENDING ---
    function sendData(text, lat, lon) {
        document.getElementById('status').innerText = "Sending...";
        fetch(localStorage.getItem('loggerScriptURL'), {
            method: 'POST', 
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, lat: lat, lon: lon })
        })
        .then(() => {
            document.getElementById('status').innerText = "✅ Saved!";
            setTimeout(() => { document.getElementById('status').innerText = "Ready"; }, 2000);
        })
        .catch(err => {
            document.getElementById('status').innerText = "Error: " + err;
        });
    }

    // Attach listeners
    btnVoice.onclick = () => startVoice(false);
    btnGps.onclick = () => startVoice(true);
  </script>
</body>
</html>
